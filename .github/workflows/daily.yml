name: SCAI daily

# Runs the production daily pipeline on GitHub's servers (no PC required),
# commits the updated paper-trading state back to the repo, and publishes a
# static snapshot of the dashboard to GitHub Pages.
#
# Timing: GitHub cron is UTC and cannot follow DST. 21:05 UTC is always at or
# after the US market close (16:00 ET): exactly +5 min in winter (EST), ~+65 min
# in summer (EDT). It never fires before close, so the EOD bar is always final.
# Actions cron is also best-effort and may be delayed several minutes under load.
# The pipeline is idempotent (skips if it already ran for today's session), so a
# delayed or duplicate trigger is harmless. Use the "Run workflow" button
# (workflow_dispatch) to trigger a run on demand.
#
# To get exactly 16:05 ET year-round you would add a second cron at '5 20 * * 1-5'
# AND a guard that exits early when it is before 16:00 ET (otherwise the summer
# trigger fires at 15:05 ET, before close). Kept single-cron here for simplicity.

on:
  schedule:
    - cron: "5 21 * * 1-5" # weekdays, 21:05 UTC
  workflow_dispatch: {}

permissions:
  contents: write # commit updated data/ back to the repo
  pages: write # publish the static dashboard
  id-token: write # required by actions/deploy-pages

concurrency:
  group: scai-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Daily pipeline
        env:
          SCAI_POLYGON_API_KEY: ${{ secrets.SCAI_POLYGON_API_KEY }}
          SCAI_SEED: "42"
          SCAI_ENV: production
          MASSIVE_CALLS_PER_MINUTE: "50"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONPATH: src
          PYTHONIOENCODING: utf-8
        run: python scripts/daily_pipeline.py

      - name: Render static dashboard
        env:
          PYTHONPATH: src
        run: python scripts/render_static_dashboard.py

      - name: Commit updated market data & model
        # Paper-trading state lives in Supabase (gitignored). This only persists
        # the OHLCV/SPY/EDGAR caches and the retrained model across runs.
        run: |
          git config user.name "scai-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "daily: update market data & model [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
