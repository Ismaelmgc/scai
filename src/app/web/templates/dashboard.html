<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAI</title>
    {% if favicon %}<link rel="icon" type="image/png" href="{{ favicon }}">{% endif %}
    <!-- PWA: installable on phone home screen. Manifest + icons live next to
         index.html on the published Pages site (relative paths 404 on the local
         FastAPI server, which has no static mount — that's fine, PWA is for Pages). -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0a0c12">
    <link rel="apple-touch-icon" href="icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SCAI">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0c12;
            --bg-elevated: #0f131b;
            --bg-card: rgba(255, 255, 255, 0.028);
            --bg-hover: rgba(255, 255, 255, 0.055);
            --border: rgba(255, 255, 255, 0.07);
            --border-light: rgba(255, 255, 255, 0.14);
            --text-primary: #f4f6fb;
            --text-secondary: #98a2b3;
            --text-muted: #5b6472;
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.13);
            --red: #f87171;
            --red-bg: rgba(248, 113, 113, 0.13);
            --blue: #e8c456;
            --blue-bg: rgba(232, 196, 86, 0.14);
            --yellow: #fbbf24;
            --yellow-bg: rgba(251, 191, 36, 0.13);
            --accent-grad: linear-gradient(135deg, #fdeaa0 0%, #e7bd47 52%, #c79331 100%);
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.35), 0 12px 32px rgba(0, 0, 0, 0.28);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            background-image:
                radial-gradient(820px circle at 12% -8%, rgba(232, 196, 86, 0.10), transparent 50%),
                radial-gradient(720px circle at 96% 0%, rgba(199, 147, 49, 0.08), transparent 46%);
            background-attachment: fixed;
        }

        /* Header */
        .header {
            background: rgba(10, 12, 18, 0.55);
            backdrop-filter: saturate(160%) blur(14px);
            -webkit-backdrop-filter: saturate(160%) blur(14px);
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .brand { display: flex; align-items: center; gap: 14px; }
        .logo-mark {
            width: 44px; height: 44px; flex-shrink: 0; object-fit: contain; display: block;
            filter: drop-shadow(0 0 10px rgba(231, 189, 71, 0.42));
            transition: transform 0.25s ease;
        }
        .brand:hover .logo-mark { transform: translateY(-1px) scale(1.04); }
        .brand-name {
            font-size: 23px; font-weight: 800; letter-spacing: -0.6px;
            background: var(--accent-grad);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.stale { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
        .data-info { color: var(--text-secondary); font-size: 12px; display: flex; align-items: center; gap: 6px; }

        /* Pipeline button */
        .btn-pipeline {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-pipeline:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(35, 134, 54, 0.4); }
        .btn-pipeline:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-pipeline.running { background: linear-gradient(135deg, #1a5c2c, #1a5c2c); }

        .live-badge { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }

        .spinner { width: 16px; height: 16px; border: 2px solid transparent; border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Login */
        .login-wrap { min-height: calc(100vh - 78px); display: flex; align-items: center; justify-content: center; padding: 24px; }
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px;
            padding: 36px 30px; width: 100%; max-width: 360px;
            display: flex; flex-direction: column; gap: 14px; text-align: center;
            box-shadow: var(--shadow-card); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .login-logo { width: 64px; height: 64px; margin: 0 auto 2px; }
        .login-card h1 {
            font-size: 26px; font-weight: 800; letter-spacing: -0.6px;
            background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .login-sub { color: var(--text-secondary); font-size: 13px; margin-top: -10px; }
        .login-card input {
            background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 14px; color: var(--text-primary); font-size: 14px; font-family: inherit;
        }
        .login-card input:focus { outline: none; border-color: rgba(232,196,86,0.5); }
        .login-card button {
            background: var(--accent-grad); color: #1a1206; border: none; border-radius: 10px;
            padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 2px;
        }
        .login-card button:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-error { color: var(--red); font-size: 12px; min-height: 16px; }
        .btn-logout {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
            border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .btn-logout:hover { color: var(--text-primary); border-color: var(--border-light); }

        /* Pipeline log modal */
        .pipeline-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .pipeline-overlay.active { display: flex; }
        .pipeline-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .pipeline-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pipeline-modal-header h3 { font-size: 15px; color: var(--text-primary); }
        .pipeline-modal-close { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; padding: 4px 8px; }
        .pipeline-log {
            padding: 16px 20px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            overflow-y: auto;
            white-space: pre-wrap;
            flex: 1;
            max-height: 500px;
            line-height: 1.7;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* KPI Cards — 12-col grid: 2 hero cards (span 6) then 4 secondary (span 3) */
        .kpi-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; margin-bottom: 16px; }
        .kpi-card {
            grid-column: span 3;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 0.2s ease, border-color 0.2s, background 0.2s;
        }
        .kpi-card.hero {
            grid-column: span 6;
            padding: 24px 20px;
            background:
                radial-gradient(420px circle at 50% 0%, rgba(232, 196, 86, 0.07), transparent 70%),
                var(--bg-card);
        }
        .kpi-card:hover { transform: translateY(-2px); border-color: var(--border-light); background: var(--bg-hover); }
        .kpi-card .label { font-size: 10.5px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 8px; }
        .kpi-card .value { font-size: 23px; font-weight: 700; letter-spacing: -0.5px; }
        .kpi-card.hero .value { font-size: 34px; letter-spacing: -1px; }
        .kpi-card .detail { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

        /* Quant metrics strip (Sharpe / max drawdown / alpha vs SPY) */
        .metrics-strip { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
        .metric-chip {
            flex: 1; min-width: 130px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px;
            display: flex; flex-direction: column; gap: 3px;
        }
        .metric-chip .m-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); }
        .metric-chip .m-value { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
        .metric-chip .m-hint { font-size: 10px; color: var(--text-muted); }
        .arrow { font-size: 0.82em; }

        /* Live-price tick flash (Finnhub WS) */
        @keyframes flashUp { 0% { background: rgba(52, 211, 153, 0.32); } 100% { background: transparent; } }
        @keyframes flashDown { 0% { background: rgba(248, 113, 113, 0.32); } 100% { background: transparent; } }
        .flash-up { animation: flashUp 0.7s ease-out; }
        .flash-down { animation: flashDown 0.7s ease-out; }
        .green { color: var(--green); }
        .red { color: var(--red); }
        .blue { color: var(--blue); }
        .yellow { color: var(--yellow); }

        /* Sections */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 18px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: var(--shadow-card);
        }
        .card h2 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .badge {
            background: var(--border);
            color: var(--text-secondary);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 500;
        }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 10px 14px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        tr:hover { background: var(--bg-hover); }
        .text-right { text-align: right; }
        .profit { color: var(--green); font-weight: 600; }
        .loss { color: var(--red); font-weight: 600; }
        .ticker { font-weight: 700; color: var(--blue); font-size: 13px; }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .tag-buy { background: var(--green-bg); color: var(--green); }
        .tag-skip { background: var(--red-bg); color: var(--red); }
        .tag-trail { background: var(--yellow-bg); color: var(--yellow); }
        .tag-expiry { background: rgba(139,148,158,0.12); color: var(--text-secondary); }
        .tag-pending { background: var(--blue-bg); color: var(--blue); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 11px; letter-spacing: 0.3px; }

        /* Strategy Tabs — pill segmented control */
        .strategy-tabs {
            display: inline-flex;
            gap: 4px;
            margin-bottom: 26px;
            padding: 5px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .strategy-tab {
            padding: 9px 22px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
            background: none;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .strategy-tab:hover { color: var(--text-primary); }
        .strategy-tab.active {
            color: #fdeaa0;
            background: rgba(232, 196, 86, 0.15);
            box-shadow: inset 0 0 0 1px rgba(232, 196, 86, 0.38);
        }
        .strategy-tab .tab-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: 500;
        }
        .strategy-tab .tab-badge.green { background: var(--green-bg); color: var(--green); }
        .strategy-tab .tab-badge.red { background: var(--red-bg); color: var(--red); }
        .strategy-panel { display: none; }
        .strategy-panel.active { display: block; }

        @media (max-width: 1000px) {
            .kpi-card { grid-column: span 6; }       /* 2 secondary per row */
            .kpi-card.hero { grid-column: span 12; }  /* hero full width */
            .grid-2 { grid-template-columns: 1fr; }
        }
        @media (max-width: 680px) {
            .container { padding: 16px; }
            .header { flex-direction: column; gap: 12px; padding: 14px 18px; }
            .header-right { flex-direction: column; gap: 8px; align-items: flex-start; }
            /* Drop the 12-col grid (its fixed gaps overflow narrow screens) for a
               plain 2-col layout: hero cards full width, secondary cards paired. */
            .kpi-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .kpi-card { grid-column: auto; }
            .kpi-card.hero { grid-column: 1 / -1; }
            .kpi-card .value { font-size: 21px; }
            .kpi-card.hero .value { font-size: 30px; }
            .metric-chip { min-width: 100px; }
            .card { padding: 18px 16px; }

            /* Tables collapse into stacked cards (label/value rows) */
            .responsive-table thead { display: none; }
            .responsive-table, .responsive-table tbody, .responsive-table tr, .responsive-table td { display: block; width: 100%; }
            .responsive-table tr {
                border: 1px solid var(--border); border-radius: 12px;
                margin-bottom: 12px; padding: 6px 2px; background: var(--bg-card);
            }
            .responsive-table tr:hover { background: var(--bg-card); }
            .responsive-table td {
                border: none; padding: 7px 14px; text-align: right;
                display: flex; justify-content: space-between; align-items: baseline; gap: 14px;
            }
            .responsive-table td::before {
                content: attr(data-label);
                color: var(--text-secondary); font-size: 10.5px;
                text-transform: uppercase; letter-spacing: 0.5px; text-align: left;
                font-weight: 600; white-space: nowrap;
            }
            .responsive-table td:first-child {
                border-bottom: 1px solid var(--border); margin-bottom: 4px; padding-bottom: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            {% if logo %}<img class="logo-mark" src="{{ logo }}" alt="SCAI">{% endif %}
            <span class="brand-name">SCAI</span>
        </div>
        <div class="header-right" id="headerRight" style="display: none;">
            <div class="data-info" id="dataInfo"></div>
            <div class="data-info" id="liveStatus" title="Precio en vivo vía Finnhub (WebSocket)">
                <span class="status-dot stale" id="liveDot"></span><span id="liveLabel">—</span>
            </div>
            {% if not static_mode %}
            <button class="btn-pipeline" id="btnPipeline" onclick="runPipeline()">
                <span class="spinner" id="pipelineSpinner"></span>
                <span id="btnText">Actualizar datos</span>
            </button>
            {% endif %}
            <button class="btn-logout" id="btnLogout" onclick="logout()">Salir</button>
        </div>
    </div>

    {% if not static_mode %}
    <!-- Pipeline log overlay (live server only) -->
    <div class="pipeline-overlay" id="pipelineOverlay">
        <div class="pipeline-modal">
            <div class="pipeline-modal-header">
                <h3 id="pipelineTitle">Pipeline en ejecución...</h3>
                <button class="pipeline-modal-close" onclick="closePipelineModal()">&times;</button>
            </div>
            <div class="pipeline-log" id="pipelineLog">Iniciando pipeline...</div>
        </div>
    </div>
    {% endif %}

    <!-- Login (shown until authenticated) -->
    <div id="login" class="login-wrap" style="display: none;">
        <form class="login-card" id="loginForm" onsubmit="return doLogin(event)">
            {% if logo %}<img class="logo-mark login-logo" src="{{ logo }}" alt="SCAI">{% endif %}
            <h1>SCAI</h1>
            <p class="login-sub">Acceso privado</p>
            <input type="email" id="email" placeholder="Email" autocomplete="username" required>
            <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
            <button type="submit" id="loginBtn">Entrar</button>
            <div class="login-error" id="loginError"></div>
        </form>
    </div>

    <!-- App (client-rendered after login) -->
    <div class="container" id="app" style="display: none;">
        <div id="appContent"></div>
    </div>

    <div class="footer" id="footer" style="display: none;"></div>

    <script>
        // ── Embedded public config (anon key + Finnhub token are public by design;
        //    data is protected by Supabase Auth + RLS, not by hiding the key) ──
        const SB_URL = {{ supabase_url | tojson }};
        const SB_ANON = {{ supabase_anon_key | tojson }};
        const FINNHUB_TOKEN = {{ finnhub_token | tojson }};
        const STATIC_MODE = {{ static_mode | tojson }};
        const LS_KEY = 'scai_session';

        // ── Auth (Supabase, vanilla REST — no SDK) ──
        function loadSession() { try { return JSON.parse(localStorage.getItem(LS_KEY)); } catch { return null; } }
        function saveSession(s) { localStorage.setItem(LS_KEY, JSON.stringify(s)); }
        function clearSession() { localStorage.removeItem(LS_KEY); }

        async function sbAuth(path, body) {
            const r = await fetch(SB_URL + '/auth/v1/' + path, {
                method: 'POST',
                headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(data.error_description || data.msg || data.error || ('HTTP ' + r.status));
            return data;
        }
        function storeTokens(data) {
            saveSession({
                access_token: data.access_token,
                refresh_token: data.refresh_token,
                expires_at: Date.now() + ((data.expires_in || 3600) * 1000),
            });
        }
        async function doLogin(ev) {
            ev.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            err.textContent = ''; btn.disabled = true; btn.textContent = 'Entrando…';
            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                storeTokens(await sbAuth('token?grant_type=password', { email, password }));
                await showApp();
            } catch (e) {
                err.textContent = 'No se pudo iniciar sesión: ' + e.message;
            } finally {
                btn.disabled = false; btn.textContent = 'Entrar';
            }
            return false;
        }
        async function getToken() {
            const s = loadSession();
            if (!s) return null;
            if (Date.now() < s.expires_at - 60000) return s.access_token;
            try {
                storeTokens(await sbAuth('token?grant_type=refresh_token', { refresh_token: s.refresh_token }));
                return loadSession().access_token;
            } catch (e) { clearSession(); return null; }
        }
        function logout() { clearSession(); stopLivePrices(); location.reload(); }

        async function fetchViews(token) {
            const r = await fetch(SB_URL + '/rest/v1/dashboard_view?select=strategy,view', {
                headers: { apikey: SB_ANON, Authorization: 'Bearer ' + token }, cache: 'no-store',
            });
            if (r.status === 401 || r.status === 403) throw new Error('unauthorized');
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const rows = await r.json();
            const out = {};
            for (const row of rows) out[row.strategy] = row.view;
            return out;
        }

        // ── Small formatters ──
        function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
        const f1 = x => (x >= 0 ? '+' : '') + Number(x).toFixed(1);
        const f2 = x => (x >= 0 ? '+' : '') + Number(x).toFixed(2);
        const m2 = x => Number(x).toFixed(2);
        const cls = x => x >= 0 ? 'green' : 'red';
        const pc = x => x >= 0 ? 'profit' : 'loss';
        const arrow = x => '<span class="arrow">' + (x >= 0 ? '▲' : '▼') + '</span>';

        // ── Render ──
        window.scaiCharts = {};

        function kpiHTML(p, sid) {
            const wrCls = p.win_rate >= 50 ? 'green' : (p.win_rate > 0 ? 'yellow' : 'red');
            return `
            <div class="kpi-grid">
              <div class="kpi-card hero">
                <div class="label">Valor Portfolio</div>
                <div class="value ${cls(p.total_return)}" data-live="value-${sid}">€${m2(p.total_value)}</div>
                <div class="detail">Capital inicial: €${Math.round(p.initial_capital)}</div>
              </div>
              <div class="kpi-card hero">
                <div class="label">Retorno Total</div>
                <div class="value ${cls(p.total_return)}" data-live="return-${sid}">${f1(p.total_return)}%</div>
                <div class="detail" data-live="profit-${sid}">${f2(p.total_value - p.initial_capital)}€ beneficio</div>
              </div>
              <div class="kpi-card">
                <div class="label">Cash Disponible</div>
                <div class="value blue">€${m2(p.cash)}</div>

        function renderDashboard(views) {
            const order = [['baseline', 'Baseline'], ['adaptive', 'Adaptive Stop']].filter(([id]) => views[id]);

                document.getElementById('appContent').innerHTML = '<div class="card" style="text-align:center; padding:60px;"><div style="font-size:48px;">📊</div><h2 style="justify-content:center;">Sin datos de Paper Trading</h2><p style="color:var(--text-secondary);">El pipeline aún no ha publicado datos.</p></div>';
                return;
            }
            const tabs = order.length > 1 ? '<div class="strategy-tabs">' + order.map(([id, name], i) => {
                const p = views[id].paper;
                return `<button class="strategy-tab${i === 0 ? ' active' : ''}" onclick="switchTab('${id}')">${name} <span class="tab-badge ${cls(p.total_return)}">${f1(p.total_return)}%</span></button>`;
            }).join('') + '</div>' : '';
            const panels = order.map(([id], i) => panelHTML(id, views[id], i === 0)).join('');
            document.getElementById('appContent').innerHTML = tabs + panels;

            // Header data-info + footer from the first view
            const di = views[order[0][0]].data_info || {};
            document.getElementById('dataInfo').innerHTML = `<span class="status-dot ok"></span>Datos: ${esc(di.latest_date || '')} · ${di.n_tickers || 0} tickers`;
            document.getElementById('footer').textContent = `SCAI Paper Trading · Modelo V3 LambdaRank · ${di.n_tickers || 0} tickers`;

            // Charts (after DOM exists)
            for (const [id] of order) {
                const p = views[id].paper;
                if (p.chart_dates && p.chart_dates.length) {
                    createPortfolioChart('portfolioChart-' + id, p.chart_dates, p.chart_values, p.initial_capital, p.spy_values);

        function switchTab(stratId) {
            document.querySelectorAll('.strategy-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.strategy-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('panel-' + stratId).classList.add('active');
            event.target.closest('.strategy-tab').classList.add('active');
        }

        function createPortfolioChart(canvasId, dates, values, initialCapital, spyValues) {
            const el = document.getElementById(canvasId);
            if (!el) return;
            if (window.scaiCharts[canvasId]) { window.scaiCharts[canvasId].destroy(); }
            const ctx = el.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 280);
            const lastVal = values[values.length - 1];
            if (lastVal >= initialCapital) {
                gradient.addColorStop(0, 'rgba(52, 211, 153, 0.28)');
                gradient.addColorStop(1, 'rgba(52, 211, 153, 0.0)');
            } else {
                gradient.addColorStop(0, 'rgba(248, 113, 113, 0.28)');
                gradient.addColorStop(1, 'rgba(248, 113, 113, 0.0)');
            }
            const datasets = [{
                label: 'Portfolio (€)', data: values,
                borderColor: lastVal >= initialCapital ? '#34d399' : '#f87171',
                backgroundColor: gradient, fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 5, borderWidth: 2,
            }, {
                label: 'Capital inicial', data: Array(dates.length).fill(initialCapital),
                borderColor: 'rgba(255, 255, 255, 0.14)', borderDash: [5, 5], borderWidth: 1, pointRadius: 0, fill: false,
            }];
            if (spyValues && spyValues.length) {
                datasets.push({
                    label: 'SPY (mismo €)', data: spyValues,
                    borderColor: 'rgba(152, 162, 179, 0.85)', borderDash: [2, 3],
                    borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, fill: false, tension: 0.3,
                });
            }
            window.scaiCharts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: { labels: dates, datasets: datasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: true, labels: { color: '#98a2b3', font: { size: 11 }, usePointStyle: true, pointStyle: 'circle' } },
                        tooltip: {
                            backgroundColor: '#0f131b', borderColor: 'rgba(255, 255, 255, 0.14)', borderWidth: 1,
                            titleColor: '#c9d1d9', bodyColor: '#e1e4e8', padding: 10,
                            callbacks: {
                                label: function (c) {
                                    if (c.datasetIndex === 0) {
                                        const pct = ((c.raw / initialCapital - 1) * 100).toFixed(1);
                                        return `€${c.raw.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct}%)`;
                                    }
                                    return `€${c.raw.toFixed(0)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { color: '#5b6472', maxTicksLimit: 10, font: { size: 11 } }, grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                        y: { ticks: { color: '#5b6472', callback: v => '€' + v.toFixed(0), font: { size: 11 } }, grid: { color: 'rgba(255, 255, 255, 0.05)' } }
                    }
                }
            });
        }

        // ── Live prices via Finnhub WebSocket (real-time, no CORS) ──
        let _ws = null, _wsClosedByUs = false;
        function stopLivePrices() { _wsClosedByUs = true; try { _ws && _ws.close(); } catch (e) {} _ws = null; }
        function startLivePrices() {
            if (!FINNHUB_TOKEN) return;
            stopLivePrices(); _wsClosedByUs = false;

            function setBadges(text, ok) {
                document.querySelectorAll('[id^="liveBadge-"]').forEach(b => {
                    const dot = b.querySelector('.status-dot');
                    if (dot) { dot.classList.toggle('ok', ok); dot.classList.toggle('stale', !ok); }
                    const lbl = b.querySelector('.live-label');
                    if (lbl) lbl.textContent = text;
                });
                const hd = document.getElementById('liveDot'), hl = document.getElementById('liveLabel');
                if (hd) { hd.classList.toggle('ok', ok); hd.classList.toggle('stale', !ok); }
                if (hl) hl.textContent = text;
            }
            function flash(cell, up) {
                if (!cell) return;
                cell.classList.remove('flash-up', 'flash-down');
                void cell.offsetWidth;
                cell.classList.add(up ? 'flash-up' : 'flash-down');
            }
            function applyPrice(ticker, price) {
                document.querySelectorAll('.positions-table tbody tr[data-ticker="' + ticker + '"]').forEach(row => {
                    const entry = parseFloat(row.dataset.entry);
                    const liveCell = row.querySelector('.td-live');
                    if (liveCell) {
                        const prev = parseFloat((liveCell.textContent || '').replace('$', ''));
                        liveCell.textContent = '$' + price.toFixed(2);
                        liveCell.style.color = '#e8c456'; liveCell.style.fontWeight = '600';
                        if (!isNaN(prev) && prev !== price) flash(liveCell, price >= prev);
                    }
                    const pctCell = row.querySelector('.td-live-pct');
                    if (pctCell && entry) {
                        const pnl = (price / entry - 1) * 100;
                        pctCell.innerHTML = '<span class="arrow">' + (pnl >= 0 ? '▲' : '▼') + '</span> ' + (pnl >= 0 ? '+' : '') + pnl.toFixed(1) + '%';
                        pctCell.className = 'text-right td-live-pct ' + (pnl >= 0 ? 'profit' : 'loss');
                        pctCell.style.fontWeight = '600';
                    }
                });
            }
            function marketOpenET() {
                const et = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
                const day = et.getDay();
                if (day === 0 || day === 6) return false;
                const mins = et.getHours() * 60 + et.getMinutes();
                return mins >= 9 * 60 + 30 && mins <= 16 * 60;
            }
            const tickers = [...new Set([...document.querySelectorAll('.positions-table tbody tr[data-ticker]')].map(r => r.dataset.ticker).filter(Boolean))];
            if (!tickers.length) { setBadges('Sin posiciones', false); return; }
            if (!marketOpenET()) setBadges('Mercado cerrado', false);

            let reconnectDelay = 2000;
            function connect() {
                _ws = new WebSocket('wss://ws.finnhub.io?token=' + encodeURIComponent(FINNHUB_TOKEN));
                _ws.onopen = () => {
                    reconnectDelay = 2000;
                    setBadges(marketOpenET() ? 'En vivo' : 'Conectado · cerrado', marketOpenET());
                    tickers.forEach(t => _ws.send(JSON.stringify({ type: 'subscribe', symbol: t })));
                };
                _ws.onmessage = (ev) => {
                    let msg; try { msg = JSON.parse(ev.data); } catch { return; }
                    if (msg.type !== 'trade' || !msg.data) return;
                    const latest = {};
                    for (const tr of msg.data) latest[tr.s] = tr.p;
                    for (const sym in latest) applyPrice(sym, latest[sym]);
                    setBadges('En vivo', true);
                };
                _ws.onclose = () => {
                    if (_wsClosedByUs) return;
                    setBadges('Reconectando…', false);
                    setTimeout(connect, reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                };
                _ws.onerror = () => { try { _ws.close(); } catch (e) {} };
            }
            connect();
        }

        // ── App lifecycle ──
        function showLogin() {
            document.getElementById('login').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
            document.getElementById('headerRight').style.display = 'none';
        }
        async function showApp() {
            const token = await getToken();
            if (!token) { showLogin(); return; }
            let views;
            try { views = await fetchViews(token); }
            catch (e) {
                if (e.message === 'unauthorized') { clearSession(); showLogin(); return; }
                document.getElementById('appContent').innerHTML = '<div class="card">Error cargando datos: ' + esc(e.message) + '</div>';
            }
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('footer').style.display = 'block';
            document.getElementById('headerRight').style.display = 'flex';
            if (views) { renderDashboard(views); startLivePrices(); }
        }
        async function refresh() {
            const token = await getToken();
            if (!token) return;
            try {
                const views = await fetchViews(token);
                renderDashboard(views);
                startLivePrices();
            } catch (e) { if (e.message === 'unauthorized') { clearSession(); showLogin(); } }
        }

        (async function init() {
            if (loadSession()) await showApp(); else showLogin();
        })();
        // Refresh when the tab/phone returns to the foreground + slow poll (view changes once/day).
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible' && loadSession()) refresh(); });
        setInterval(() => { if (loadSession() && document.visibilityState === 'visible') refresh(); }, 600000);

        {% if not static_mode %}
        // ── Pipeline trigger (live server only) ──
        let pollInterval = null;
        function runPipeline() {
            const btn = document.getElementById('btnPipeline'), spinner = document.getElementById('pipelineSpinner'),
                  btnText = document.getElementById('btnText'), overlay = document.getElementById('pipelineOverlay'),
                  logEl = document.getElementById('pipelineLog'), titleEl = document.getElementById('pipelineTitle');
            btn.disabled = true; btn.classList.add('running'); spinner.style.display = 'inline-block'; btnText.textContent = 'Ejecutando...';
            overlay.classList.add('active'); logEl.textContent = 'Iniciando pipeline...\n';
            titleEl.textContent = 'Pipeline en ejecución...'; titleEl.style.color = 'var(--yellow)';
            fetch('/api/run-pipeline', { method: 'POST' }).then(r => r.json()).then(data => {
                logEl.textContent += 'Pipeline iniciado (PID: ' + data.pid + ')\n';
                pollInterval = setInterval(checkPipelineStatus, 3000);
            }).catch(err => { logEl.textContent += 'Error: ' + err.message + '\n'; resetButton(); });
        }
        function checkPipelineStatus() {
            const logEl = document.getElementById('pipelineLog'), titleEl = document.getElementById('pipelineTitle');
            fetch('/api/pipeline-status').then(r => r.json()).then(data => {
                if (data.status === 'running') { if (data.log_tail) logEl.textContent = data.log_tail; logEl.scrollTop = logEl.scrollHeight; }
                else if (data.status === 'finished') {
                    clearInterval(pollInterval);
                    if (data.log_tail) logEl.textContent = data.log_tail;
                    if (data.exit_code === 0) { titleEl.textContent = 'Pipeline completado'; titleEl.style.color = 'var(--green)'; logEl.textContent += '\n\n✓ Completado. Recargando...'; setTimeout(() => location.reload(), 2000); }
                    else { titleEl.textContent = 'Pipeline falló (' + data.exit_code + ')'; titleEl.style.color = 'var(--red)'; resetButton(); }
                } else { clearInterval(pollInterval); resetButton(); }
            }).catch(() => {});
        }
        function closePipelineModal() { document.getElementById('pipelineOverlay').classList.remove('active'); }
        function resetButton() {
            const btn = document.getElementById('btnPipeline'), spinner = document.getElementById('pipelineSpinner'), btnText = document.getElementById('btnText');
            btn.disabled = false; btn.classList.remove('running'); spinner.style.display = 'none'; btnText.textContent = 'Actualizar datos';
        }
        {% endif %}
    </script>
</body>
</html>
